<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Top Home Designers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --gold: #d4af37;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: var(--primary); }
        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        .btn-gold { 
            background: linear-gradient(135deg, var(--gold) 0%, #c9a961 100%);
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .sidebar-link.active {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border-left: 4px solid var(--gold);
        }
        .preloader {
            background: var(--primary);
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .preloader.fade-out {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-100%);
        }
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s ease-in-out infinite, pulse-glow 2s ease-in-out infinite;
            margin-bottom: 24px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .welcome-text {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards 0.2s;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="loader-ring"></div>
        <div class="welcome-text">WELCOME, Top home designer😉</div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-primary text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h2 class="text-xl font-bold text-gold tracking-tight">THD ADMIN</h2>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" class="sidebar-link active flex items-center space-x-3 p-3 rounded-lg transition-all">
                    <i class="fas fa-inbox w-5"></i>
                    <span>Submissions</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full flex items-center justify-center space-x-2 p-3 rounded-lg bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all font-medium">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
                <div class="flex items-center space-x-4">
                    <button class="md:hidden text-gray-600">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800">Submissions</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="hidden sm:block text-right">
                        <p class="text-sm font-medium text-gray-900">Administrator</p>
                        <p class="text-xs text-gray-500">Live Dashboard</p>
                    </div>
                    <div class="h-10 w-10 rounded-full bg-primary border-2 border-gold flex items-center justify-center text-gold font-bold">
                        A
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Stats -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow">
                        <div class="h-12 w-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl">
                            <i class="fas fa-envelope-open-text"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Total Submissions</p>
                            <p class="text-2xl font-bold text-gray-900" id="totalCount">0</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow">
                        <div class="h-12 w-12 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-xl">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Today's Inquiries</p>
                            <p class="text-2xl font-bold text-gray-900" id="todayCount">0</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow hidden lg:flex">
                        <div class="h-12 w-12 rounded-xl bg-green-50 text-green-600 flex items-center justify-center text-xl">
                            <i class="fas fa-circle text-[10px] animate-pulse"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">System Status</p>
                            <p class="text-2xl font-bold text-gray-900">Live</p>
                        </div>
                    </div>
                </div>

                <!-- Submissions Table/List -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-lg font-semibold text-gray-800">Recent Inquiries</h3>
                        <button onclick="loadSubmissions()" class="inline-flex items-center px-4 py-2 text-sm font-medium text-gold bg-gold/5 rounded-lg hover:bg-gold/10 transition-colors">
                            <i class="fas fa-sync-alt mr-2"></i> Refresh
                        </button>
                    </div>
                    <div id="submissionsList" class="divide-y divide-gray-100">
                        <div class="p-12 text-center text-gray-400">
                            <i class="fas fa-spinner fa-spin text-3xl mb-4 text-gold"></i>
                            <p>Loading submissions...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        const API_URL = 'https://tophomedesigner.onrender.com';
        let authHeader = localStorage.getItem('adminAuth');
        
        if (!authHeader) {
            window.location.href = '../';
        } else {
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            loadSubmissions();
            
            // Hide preloader after a short delay for effect
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.classList.add('fade-out');
                }
            }, 2000);
        }
        
        async function loadSubmissions() {
            try {
                const response = await fetch(`${API_URL}/api/admin/submissions`, {
                    headers: { 'Authorization': authHeader }
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                
                if (data.success) {
                    displaySubmissions(data.data);
                } else {
                    document.getElementById('submissionsList').innerHTML = `
                        <div class="p-12 text-center">
                            <div class="text-red-500 mb-2 font-medium">Failed to load submissions</div>
                            <p class="text-gray-500 text-sm">Please check your authentication or server status.</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('submissionsList').innerHTML = `
                    <div class="p-12 text-center">
                        <div class="text-red-500 mb-2 font-medium">Error connecting to server</div>
                        <p class="text-gray-500 text-sm">Make sure the backend is running at ${API_URL}</p>
                    </div>
                `;
            }
        }
        
        function displaySubmissions(submissions) {
            const listEl = document.getElementById('submissionsList');
            document.getElementById('totalCount').textContent = submissions.length;
            
            const today = new Date().toDateString();
            const todayCount = submissions.filter(s => new Date(s.created_at).toDateString() === today).length;
            document.getElementById('todayCount').textContent = todayCount;
            
            if (submissions.length === 0) {
                listEl.innerHTML = `
                    <div class="p-12 text-center text-gray-400">
                        <i class="fas fa-folder-open text-4xl mb-4 text-gray-200"></i>
                        <p>No submissions found yet.</p>
                    </div>
                `;
                return;
            }
            
            listEl.innerHTML = submissions.map(sub => `
                <div class="p-6 hover:bg-gray-50/50 transition-colors group">
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6">
                        <div class="flex-1">
                            <div class="flex items-center flex-wrap gap-3 mb-3">
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-500 text-[10px] font-bold rounded uppercase tracking-wider">#${sub.id}</span>
                                <h4 class="text-lg font-bold text-gray-900">${sub.name}</h4>
                                ${sub.service ? `<span class="px-2 py-0.5 bg-gold/10 text-gold text-[10px] font-bold rounded uppercase tracking-wider">${sub.service}</span>` : ''}
                            </div>
                            <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm text-gray-500 mb-4">
                                <span class="flex items-center"><i class="fas fa-envelope mr-2 text-gold/60"></i>${sub.email}</span>
                                <span class="flex items-center"><i class="fas fa-phone mr-2 text-gold/60"></i>${sub.phone || '<span class="text-gray-300 italic text-xs">Not Provided</span>'}</span>
                                <span class="flex items-center"><i class="fas fa-calendar-alt mr-2 text-gold/60"></i>${new Date(sub.created_at).toLocaleString()}</span>
                            </div>
                            <div class="bg-gray-50 p-5 rounded-xl border border-gray-100 group-hover:bg-white group-hover:border-gold/20 transition-all">
                                <p class="text-gray-700 leading-relaxed whitespace-pre-wrap">${sub.message}</p>
                            </div>
                        </div>
                        <div class="flex md:flex-col items-center gap-3">
                            <button onclick="deleteSubmission(${sub.id})" class="inline-flex items-center justify-center p-2.5 text-red-500 hover:bg-red-50 rounded-xl transition-all border border-transparent hover:border-red-100" title="Delete Submission">
                                <i class="fas fa-trash-alt"></i>
                                <span class="md:hidden ml-2 font-medium">Delete Submission</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function deleteSubmission(id) {
            if (!confirm('Are you sure you want to delete this submission? This action cannot be undone.')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/submissions/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': authHeader }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadSubmissions();
                } else {
                    alert('Failed to delete submission');
                }
            } catch (error) {
                alert('Failed to delete submission');
            }
        }
        
        function logout() {
            localStorage.removeItem('adminAuth');
            window.location.href = 'https://tophomedesigner.com';
        }
    </script>
</body>
</html>
